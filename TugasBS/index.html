<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
</head>
<body>
    <div class="container mt-4">
  <h2>Portfolio Saya</h2>
  <div class="row g-4">

    <!-- Card 1 -->
    <div class="col-12 col-sm-6 col-lg-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/400/250?random=20" 
             class="card-img-top" alt="Project 1">
        <div class="card-body">
          <h5 class="card-title"></h5>
          <p class="card-text">M.Raihan Al Lutfi</p>
          <span class="badge bg-primary me-1">HTML</span>
          <span class="badge bg-success me-1">CSS</span>
          <span class="badge bg-warning text-dark">Bootstrap</span>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-12 col-sm-6 col-lg-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/400/250?random=21" 
             class="card-img-top" alt="Project 2">
        <div class="card-body">
          <h5 class="card-title">Landing Page Startup</h5>
          <p class="card-text">Landing page modern dengan animasi scroll dan layout responsif.</p>
          <span class="badge bg-primary me-1">HTML</span>
          <span class="badge bg-success me-1">CSS</span>
          <span class="badge bg-info text-dark">JavaScript</span>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-12 col-sm-6 col-lg-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/400/250?random=22" 
             class="card-img-top" alt="Project 3">
        <div class="card-body">
          <h5 class="card-title">Dashboard Admin</h5>
          <p class="card-text">Panel admin dengan sidebar responsif dan grafik interaktif.</p>
          <span class="badge bg-primary me-1">HTML</span>
          <span class="badge bg-danger me-1">SASS</span>
          <span class="badge bg-warning text-dark">Bootstrap</span>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
