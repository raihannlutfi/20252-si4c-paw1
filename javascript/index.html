<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar JavaScript</title>
</head>
<body>
    <h1>Belajar Javascript</h1>
    <p id="demo">Hai</p>

    <!-- inline js -->
     <button onclick="alert('Selamat Datang Hewan')
     ">Pencet oi</button>

     <!-- internal js -->
      <script>
        // ini komentar di Javascript
        // mengubah konten pragraf id=demo
        document.getElementById('demo').innerHTML = 'Text Hello diubah menjadi Selamat Datang';

        // mengubah warna pragraf id=demo
        document.getElementById('demo').style.color = 'green';

        // menampilkan pesan di console
        console.log('Pesan ini dapat dilihat di consolen browser');
      </script>

      <!-- external js -->
      <script src="script.js"></script>
      
</body>
</html>
